name: app
description: "AI Outfit Generator — Smart wardrobe & outfit recommendations"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
