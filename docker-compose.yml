version: '3.8'

services:
  # ── Backend API ──
  backend:
    build: ./backend
    container_name: styleai-backend
    ports:
      - "3000:3000"
    # We load all variables directly from your backend/.env file
    # This prevents accidentally leaking keys to GitHub inside docker-compose.yml
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: styleai-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data:
